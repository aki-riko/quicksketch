name: Build macOS

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app_ver:
        description: "应用版本号 (写入 bundle / dmg 文件名)"
        required: false
        default: "1.0.0"

jobs:
  build:
    name: Build ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 调试期临时只跑 Intel(排队快、run 能快速结束便于取日志);调通后恢复 arm64
          - runner: macos-13   # Intel
            label: x86_64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "app_ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "app_ver=${{ github.event.inputs.app_ver || '1.0.0' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Generate .icns icon
        run: python scripts/make_icns.py

      - name: Build .app and .dmg
        env:
          APP_VER: ${{ steps.ver.outputs.app_ver }}
          PYTHON: python
        run: bash -x scripts/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexConfig-macos-${{ matrix.label }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
