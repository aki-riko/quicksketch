name: Build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      app_ver:
        description: "应用版本号 (写入 bundle / dmg 文件名)"
        required: false
        default: "1.0.6"

# 让 Attach to release 步骤能创建 Release(默认 GITHUB_TOKEN 只读)
permissions:
  contents: write

jobs:
  build-macos:
    name: Build macOS ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # 调试期只跑 Apple Silicon(客户用的就是 arm64 Mac);调通后按需加回 x86_64
          - runner: macos-14   # Apple Silicon
            label: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "app_ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "app_ver=${{ github.event.inputs.app_ver || '1.0.6' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Generate .icns icon
        run: python scripts/make_icns.py

      - name: Build .app and .dmg
        env:
          APP_VER: ${{ steps.ver.outputs.app_ver }}
          PYTHON: python
        run: bash -x scripts/build_macos.sh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexConfig-macos-${{ matrix.label }}
          path: dist/*.dmg
          if-no-files-found: error

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg

  build-windows:
    name: Build Windows
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            echo "app_ver=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
          else
            echo "app_ver=${{ github.event.inputs.app_ver || '1.0.6' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install nuitka

      - name: Build standalone (Nuitka)
        shell: bash
        run: |
          FQ="$(python -c 'import os,prismqml;print(os.path.dirname(prismqml.__file__))')"
          python -m nuitka \
            --standalone --assume-yes-for-downloads \
            --enable-plugin=pyside6 --include-qt-plugins=qml \
            --include-data-dir=qml=qml \
            --include-data-dir=resources=resources \
            --include-data-dir="$FQ=prismqml" \
            --include-data-files=providers.json=providers.json \
            --include-package=prismqml --include-package=backend \
            --windows-console-mode=disable \
            --windows-icon-from-ico=resources/app_icon.ico \
            --output-dir=build --output-filename=CodexConfig.exe \
            --company-name=9li --product-name=CodexConfig \
            --file-version=${{ steps.ver.outputs.app_ver }} \
            main.py

      #__WIN_INNO__
      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer (Inno Setup)
        shell: bash
        run: |
          ISCC="/c/Program Files (x86)/Inno Setup 6/ISCC.exe"
          [ -f "$ISCC" ] || ISCC="/c/Program Files/Inno Setup 6/ISCC.exe"
          # 直接 sed 改 .iss 里的版本号,避开 Git-bash 对 /D 参数的路径转换坑
          # 正则匹配任意旧版本号(版本无关),以后升版本只改 .iss + 打 tag,此处不用动
          sed -i 's/AppVer "[0-9][0-9.]*"/AppVer "${{ steps.ver.outputs.app_ver }}"/' CodexConfig.iss
          grep -n AppVer CodexConfig.iss
          "$ISCC" CodexConfig.iss
          ls -la installer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: CodexConfig-windows
          path: installer/*.exe
          if-no-files-found: error

      - name: Attach to release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: installer/*.exe
